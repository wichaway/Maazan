<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המאזן שלי</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F6F5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="המאזן">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ECEFED;--surface:#FFFFFF;--surface-2:#F6F8F6;--line:#E1E6E2;
    --ink:#15211E;--muted:#5C6B66;--faint:#8B978F;
    --primary:#1F6F5C;--primary-dark:#164F42;
    --gold:#B0871F;--gold-soft:#F3E9CF;
    --pos:#1F7A4D;--neg:#B23A2E;--amber:#C0851A;
    --radius:16px;--shadow:0 1px 2px rgba(21,33,30,.04),0 6px 20px rgba(21,33,30,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:"Assistant",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{line-height:1.5;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  h1,h2,h3{font-family:"Frank Ruhl Libre",serif;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select{font-family:inherit;font-size:1rem}

  /* Login screen */
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:20px;text-align:center}
  .login-screen h1{font-size:2rem;font-weight:900}
  .login-screen p{color:var(--muted);font-size:.95rem}
  .btn-google{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 24px;font-size:1rem;font-weight:700;color:var(--ink);box-shadow:var(--shadow);cursor:pointer}
  .btn-google svg{width:22px;height:22px}
  .sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:var(--faint);background:var(--surface-2);border:1px solid var(--line);border-radius:99px;padding:3px 10px}
  .sync-badge.syncing{color:var(--amber)}
  .sync-badge.ok{color:var(--pos)}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand h1{font-size:1.55rem;font-weight:900;letter-spacing:-.01em}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);align-self:center}
  .header-right{display:flex;align-items:center;gap:10px}
  .user-avatar{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid var(--primary)}

  .monthnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px}
  .monthnav button{background:var(--surface);border:1px solid var(--line);width:38px;height:38px;border-radius:11px;color:var(--ink);font-size:1.2rem;display:grid;place-items:center;box-shadow:var(--shadow);transition:.15s}
  .monthnav button:hover{border-color:var(--primary);color:var(--primary)}
  .monthnav .label{font-family:"Frank Ruhl Libre",serif;font-weight:700;font-size:1.15rem;min-width:160px;text-align:center}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
  .card-title{font-size:1.02rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .eyebrow{font-family:"Assistant";font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}

  .hero{background:linear-gradient(160deg,#1B5648,#143F35);color:#fff;border:none;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 90% -10%,rgba(176,135,31,.35),transparent 60%);pointer-events:none}
  .hero .eyebrow{color:rgba(255,255,255,.6)}
  .ledger-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:10px 0 6px;opacity:.9}
  .hero .balance{font-family:"Frank Ruhl Libre",serif;font-size:3rem;font-weight:900;letter-spacing:-.02em;line-height:1}
  .hero .balance.pos{color:#9BE6C0}
  .hero .balance.neg{color:#FFB3A6}
  .hero .status{margin-top:10px;font-size:.95rem;color:rgba(255,255,255,.88)}
  .hero .io{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap}
  .hero .io .k{display:block;font-size:.74rem;color:rgba(255,255,255,.6);letter-spacing:.04em}
  .hero .io .v{font-family:"Frank Ruhl Libre",serif;font-size:1.3rem;font-weight:700;margin-top:2px;display:block}
  .hero .io-acct{cursor:pointer;padding-right:18px;border-right:1px solid rgba(255,255,255,.18)}
  .hero .io-acct .v{color:#F0D89A}

  .tx-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .tx-col-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
  .tx-col-card .col-title{font-weight:700;font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .tx-col-card .col-title .total{font-family:"Frank Ruhl Libre",serif;font-size:1.1rem}
  .col-inc .col-title .total{color:var(--pos)}
  .col-exp .col-title .total{color:var(--neg)}
  .col-inc{border-top:3px solid var(--pos)}
  .col-exp{border-top:3px solid var(--neg)}

  .tx{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .tx:last-child{border-bottom:none}
  .tx .tag{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:1rem;flex-shrink:0;background:var(--surface-2);cursor:pointer}
  .tx .info{flex:1;min-width:0;cursor:pointer}
  .tx .info .d{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .info .m{font-size:.74rem;color:var(--faint)}
  .tx .amt{font-family:"Frank Ruhl Libre",serif;font-weight:700;font-size:.95rem;white-space:nowrap;cursor:pointer}
  .tx .amt.inc{color:var(--pos)}
  .tx .amt.exp{color:var(--neg)}
  .tx .del{background:none;color:var(--faint);font-size:1rem;padding:3px 5px;border-radius:7px;opacity:.5;transition:.15s}
  .tx .del:hover{opacity:1;color:var(--neg);background:#FBE9E6}
  .editpen{font-size:.72rem;opacity:.5}
  .tx .info:hover .editpen{opacity:1;color:var(--primary)}
  .empty{text-align:center;color:var(--faint);padding:18px 6px;font-size:.85rem}

  .bar{height:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .bar .fill{height:100%;border-radius:99px;transition:width .5s ease,background .3s}
  .barmeta{display:flex;justify-content:space-between;font-size:.85rem;margin-top:9px;color:var(--muted)}
  .alert{border-radius:11px;padding:11px 13px;font-size:.9rem;font-weight:600;margin-top:13px;display:flex;gap:9px;align-items:flex-start}
  .alert.ok{background:#EAF5EE;color:var(--pos)}
  .alert.warn{background:#FBF1DE;color:#9A6A12}
  .alert.over{background:#FBE9E6;color:var(--neg)}

  .cat{margin-bottom:12px}.cat:last-child{margin-bottom:0}
  .cat .top{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:5px}
  .cat .top .name{font-weight:600}
  .cat .top .vals{color:var(--muted)}
  .cat .top .vals b{color:var(--ink)}

  .seg{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;padding:9px;border-radius:9px;background:transparent;color:var(--muted);font-weight:700;font-size:.92rem;transition:.15s}
  .seg button.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .seg button.active.inc{color:var(--pos)}
  .seg button.active.exp{color:var(--neg)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:5px;font-weight:600}
  .field input,.field select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--surface-2);color:var(--ink);transition:.15s}
  .field input:focus,.field select:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(31,111,92,.12)}
  .row{display:flex;gap:10px}
  .row .field{flex:1}
  .btn-primary{width:100%;padding:13px;background:var(--primary);color:#fff;border-radius:12px;font-weight:700;font-size:1rem;transition:.15s;box-shadow:var(--shadow)}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-ghost{background:var(--surface-2);border:1px solid var(--line);color:var(--ink);padding:9px 14px;border-radius:10px;font-weight:600;font-size:.88rem;transition:.15s}
  .btn-ghost:hover{border-color:var(--primary);color:var(--primary)}

  .savings-total{font-family:"Frank Ruhl Libre",serif;font-size:2rem;font-weight:900;color:var(--gold)}
  .savings-sub{color:var(--muted);font-size:.88rem;margin-bottom:14px}
  .suggest{background:var(--surface-2);border:1px dashed var(--gold);border-radius:12px;padding:13px;margin-bottom:12px;font-size:.92rem}
  .suggest b{color:var(--primary-dark)}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .chip{background:#fff;border:1px solid var(--line);border-radius:99px;padding:7px 13px;font-weight:600;font-size:.85rem;color:var(--ink);transition:.15s}
  .chip:hover{border-color:var(--gold);color:var(--gold)}

  .tip-hero{background:var(--surface-2);border-radius:12px;padding:14px;margin-bottom:14px;font-size:.96rem;line-height:1.55;border-right:3px solid var(--gold)}
  .tip-hero .label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;display:block;margin-bottom:5px}

  details summary{cursor:pointer;list-style:none;font-weight:700;color:var(--muted);font-size:.9rem;display:flex;align-items:center;gap:6px}
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:"⚙"}
  details[open] summary{margin-bottom:14px;color:var(--ink)}

  .foot{text-align:center;color:var(--faint);font-size:.78rem;margin-top:22px;line-height:1.6}
  .loading{text-align:center;padding:50px;color:var(--faint)}

  .overlay{position:fixed;inset:0;background:rgba(21,33,30,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .15s ease}
  .modal{background:var(--surface);width:100%;max-width:680px;border-radius:20px 20px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(21,33,30,.25);animation:slideup .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media(min-width:600px){.overlay{align-items:center}.modal{border-radius:20px;margin:0 16px}}

  .toast{position:fixed;bottom:24px;right:50%;transform:translate(50%,20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:.92rem;font-weight:600;box-shadow:0 8px 30px rgba(21,33,30,.3);z-index:80;opacity:0;transition:.25s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translate(50%,0)}

  @media(max-width:560px){
    .hero .balance{font-size:2.4rem}
    body{padding:14px 10px 50px}
    .card{padding:16px}
    .tx .info .d{font-size:.78rem}
    .tx .info .m{font-size:.68rem}
    .tx .amt{font-size:.82rem}
    .tx .tag{width:28px;height:28px;font-size:.85rem}
    .tx-col-card{padding:10px}
    .tx-col-card .col-title{font-size:.82rem}
  }

  .rotate-btn{position:fixed;bottom:18px;left:18px;z-index:99;background:var(--primary);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:1.2rem;display:grid;place-items:center;box-shadow:0 4px 14px rgba(21,33,30,.25);cursor:pointer}
  .rotate-btn:hover{background:var(--primary-dark)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">טוען…</div></div>
<div id="modal-root"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, setPersistence, indexedDBLocalPersistence, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyABZObqzm7p80ifzbXIqbk1C_tAdLLNIlE",
  authDomain: "maazan-f82f6.firebaseapp.com",
  projectId: "maazan-f82f6",
  storageBucket: "maazan-f82f6.firebasestorage.app",
  messagingSenderId: "602042982070",
  appId: "1:602042982070:web:a826ba08e49b3730e59017"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── constants ──────────────────────────────────────────────
const ILS = new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0});
const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const EXPENSE_CATS = [
  {id:'food',name:'מזון וסופר',icon:'🛒'},{id:'home',name:'דיור וחשבונות',icon:'🏠'},
  {id:'transport',name:'תחבורה',icon:'🚗'},{id:'shopping',name:'קניות לבית',icon:'🛍️'},
  {id:'fun',name:'בילויים',icon:'🎉'},{id:'health',name:'בריאות',icon:'💊'},
  {id:'kids',name:'ילדים',icon:'👶'},{id:'invest',name:'השקעות',icon:'📈'},
  {id:'clothes',name:'ביגוד והנעלה',icon:'👟'},{id:'insurance',name:'ביטוחים',icon:'🛡️'},
  {id:'credit',name:'אשראי',icon:'💳'},{id:'alimony',name:'מזונות',icon:'👨‍👩‍👧'},
  {id:'taxes',name:'מיסים ממשלתיים',icon:'🏛️'},{id:'other',name:'אחר',icon:'📦'},
];
const INCOME_CATS = [
  {id:'salary',name:'משכורת',icon:'💼'},{id:'lessons',name:'שיעורים',icon:'📚'},
  {id:'side',name:'הכנסה צדדית',icon:'💡'},{id:'other_i',name:'אחר',icon:'💰'},
];
const ALL_CATS = [...EXPENSE_CATS,...INCOME_CATS];
const TIPS = [
  'בדוק מנויים חודשיים ששכחת מהם — סטרימינג, אפליקציות, חדר כושר.',
  'לפני קנייה גדולה, חכה 24 שעות. הרבה פעמים הרצון פשוט נעלם.',
  'עשה קניות סופר עם רשימה מוכנה ובבטן מלאה.',
  'השווה מחירים לפני קנייה גדולה לבית.',
  'קבע הוראת קבע אוטומטית לחיסכון ביום שמקבלים משכורת.',
  'מוצרי בסיס משתלם לקנות בכמויות כשיש מבצע.',
  'בדוק את חשבון החשמל והסלולר אחת לחצי שנה.',
  'הגדר תקציב לבילויים ומשוך אותו במזומן — כשנגמר, נגמר.',
  'הוצאות קטנות כמו קפה ומשלוחים מצטברות מהר — עקוב אחריהן שבוע אחד ותופתע.',
];

// ── state ──────────────────────────────────────────────────
let state = {settings:null,month:null,tx:[],savings:0,accountBalance:null};
let currentUser = null;
let formType = 'expense';
let syncStatus = 'idle'; // idle | syncing | ok | error
let unsubscribeSnapshot = null;

// ── Firebase helpers ───────────────────────────────────────
function userRef(key) {
  return doc(db, 'users', currentUser.uid, 'budget', key);
}

async function fbGet(key) {
  try {
    const snap = await getDoc(userRef(key));
    return snap.exists() ? snap.data().value : null;
  } catch(e) { return null; }
}

async function fbSet(key, value) {
  setSyncStatus('syncing');
  try {
    await setDoc(userRef(key), { value });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

function setSyncStatus(s) {
  syncStatus = s;
  const el = document.getElementById('sync-badge');
  if (!el) return;
  el.className = 'sync-badge ' + (s === 'syncing' ? 'syncing' : s === 'ok' ? 'ok' : '');
  el.textContent = s === 'syncing' ? '⟳ מסנכרן…' : s === 'ok' ? '✓ מסונכרן' : '☁ ענן';
}

const monthKey = m => m;

// ── auth ───────────────────────────────────────────────────
window.signInWithGoogle = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await setPersistence(auth, indexedDBLocalPersistence);
    const isSafari = /Safari/i.test(navigator.userAgent) && !/Chrome/i.test(navigator.userAgent);
    if (isSafari) {
      await signInWithRedirect(auth, provider);
    } else {
      await signInWithPopup(auth, provider);
    }
  } catch(e) { toast('שגיאה בכניסה: ' + e.message); }
};

// Handle redirect result on page load (Safari)
getRedirectResult(auth).then(result => {
  if (result && result.user) {
    // onAuthStateChanged will handle the rest
  }
}).catch(() => {});

window.doSignOut = async () => {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  await signOut(auth);
};

onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    await init();
  } else {
    renderLogin();
  }
});

// ── init ───────────────────────────────────────────────────
async function init() {
  const now = new Date();
  state.month = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  state.settings = await fbGet('settings') || {monthlyBudget:0,savingsGoal:0,catLimits:{},accountSet:false,openingBalance:0,openingDate:null};
  state.savings = (await fbGet('savings')) ?? 0;
  await loadMonth();
  await rerender();
  listenMonth();
}

async function loadMonth() {
  state.tx = (await fbGet(monthKey(state.month))) || [];
}

function listenMonth() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const ref = userRef(state.month);
  unsubscribeSnapshot = onSnapshot(ref, snap => {
    if (snap.exists()) {
      const newTx = snap.data().value || [];
      state.tx = newTx;
      rerender();
    }
  });
}

async function rerender() { await recomputeAccount(); render(); }

async function recomputeAccount() {
  const s = state.settings;
  if (!s.accountSet) { state.accountBalance = null; return; }
  let sum = s.openingBalance || 0;
  const since = s.openingDate ? new Date(s.openingDate) : new Date(0);
  for (const t of state.tx) {
    if (new Date(t.date) >= since) sum += t.type === 'income' ? t.amount : -t.amount;
  }
  state.accountBalance = Math.round(sum * 100) / 100;
}

// ── data ops ───────────────────────────────────────────────
async function addTx(t) { state.tx.unshift(t); await fbSet(monthKey(state.month), state.tx); await rerender(); }
async function delTx(id) { state.tx = state.tx.filter(t => t.id !== id); await fbSet(monthKey(state.month), state.tx); await rerender(); }
async function editTx(id, changes) { state.tx = state.tx.map(t => t.id===id ? {...t,...changes} : t); await fbSet(monthKey(state.month), state.tx); await rerender(); }
async function saveSettings(s) { state.settings = {...state.settings,...s}; await fbSet('settings', state.settings); await rerender(); }
async function addSavings(amt) { state.savings = Math.max(0, Math.round((state.savings+amt)*100)/100); await fbSet('savings', state.savings); render(); }
async function setAccountBalance(val) { state.settings = {...state.settings,accountSet:true,openingBalance:Math.round(val*100)/100,openingDate:new Date(todayStr()+'T00:00:00').toISOString()}; await fbSet('settings', state.settings); await rerender(); }

window.changeMonth = async d => {
  let [y,m] = state.month.split('-').map(Number);
  m += d; if(m<1){m=12;y--} if(m>12){m=1;y++}
  state.month = y+'-'+String(m).padStart(2,'0');
  await loadMonth(); await rerender(); listenMonth();
};

// ── render ─────────────────────────────────────────────────
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="brand" style="justify-content:center"><span class="dot"></span><h1>המאזן שלי</h1></div>
      <p>מעקב תקציב חודשי, מסונכרן בין כל המכשירים שלך</p>
      <button class="btn-google" onclick="signInWithGoogle()">

function totals() {
  let inc=0,exp=0; const byCat={};
  for(const t of state.tx){if(t.type==='income')inc+=t.amount;else{exp+=t.amount;byCat[t.cat]=(byCat[t.cat]||0)+t.amount;}}
  return{inc,exp,balance:inc-exp,byCat};
}

      <div class="savings-total num">${ILS.format(state.savings)}</div>
      <div class="savings-sub">${savingsSub(s.savingsGoal)}</div>
      ${s.savingsGoal>0?`<div class="bar" style="margin-bottom:14px"><div class="fill" style="width:${Math.min(state.savings/s.savingsGoal*100,100)}%;background:var(--gold)"></div></div>`:''}
      ${balance>0?`<div class="suggest">החודש אתה ב<b>רווח של ${ILS.format(balance)}</b>. רוצה לנעול חלק ממנו?
        <div class="chip-row">
          <button class="chip num" onclick="addSavings(${Math.round(balance*.1)})">+ ${ILS.format(Math.round(balance*.1))} (10%)</button>

      <p style="color:var(--muted);font-size:.88rem;margin-bottom:14px">הנתונים שלך מסונכרנים לענן אוטומטית. ניתן גם לייצא גיבוי ידני.</p>
      <div class="chip-row">
        <button class="chip" onclick="showDataText()">📋 גיבוי JSON</button>
        <button class="chip" onclick="showCSVText()">📋 גיבוי CSV</button>
        <label class="chip" style="cursor:pointer">⬆ שחזור מגיבוי<input type="file" accept=".json,application/json" onchange="importBackup(this)" style="display:none"></label>
      </div>
    </div>

    <div class="card">
      <details id="settings">
        <summary>הגדרות תקציב</summary>
        <div class="field"><label>תקרת הוצאות חודשית (₪)</label><input id="set-budget" type="number" min="0" value="${budget||''}" placeholder="למשל 8000"></div>
        <div class="field"><label>יתרת חשבון נוכחית (₪)</label><input id="set-account" type="number" value="${s.accountSet?s.openingBalance:''}" placeholder="למשל 12500"><span style="font-size:.76rem;color:var(--faint)">היתרה האמיתית בבנק כרגע.</span></div>
        <div class="field"><label>יעד חיסכון (₪)</label><input id="set-goal" type="number" min="0" value="${s.savingsGoal||''}" placeholder="למשל 20000"></div>
        <p style="font-size:.8rem;color:var(--faint);margin-bottom:12px">תקרות לפי קטגוריה (לא חובה):</p>
        <div class="row" style="flex-wrap:wrap;gap:8px">
          ${EXPENSE_CATS.map(c=>`<div class="field" style="flex:1 1 45%;min-width:120px"><label>${c.icon} ${c.name}</label><input data-cat="${c.id}" type="number" min="0" value="${s.catLimits[c.id]||''}" placeholder="₪"></div>`).join('')}
        </div>
        <button class="btn-primary" onclick="submitSettings()">שמור הגדרות</button>

    <div class="foot">הנתונים שלך מסונכרנים בענן ומוגנים עם חשבון Google שלך.</div>

  setSyncStatus(syncStatus);

  if(/Mobi|Android|iPhone/i.test(navigator.userAgent)){
    const btn = document.createElement('button');
    btn.className='rotate-btn'; btn.title='עבור למצב רוחב'; btn.innerHTML='⟳';
    btn.onclick=()=>{if(screen.orientation&&screen.orientation.lock){const cur=screen.orientation.type;const target=cur.includes('landscape')?'portrait':'landscape';screen.orientation.lock(target).catch(()=>toast('הפוך את הטלפון ידנית 📱'));}else{toast('הפוך את הטלפון ידנית 📱');}};

// ── helpers ────────────────────────────────────────────────
function balanceStatus(bal,inc,exp){if(inc===0&&exp===0)return'הוסף תנועות כדי לראות איפה אתה עומד.';if(bal>0)return'יפה! נשארת עם עודף החודש.';if(bal===0)return'אתה בדיוק על אפס.';return'ההוצאות עלו על ההכנסות. כדאי לבדוק את הקטגוריות.';}
function budgetView(exp,budget,ratio){const col=ratio>1?'var(--neg)':ratio>.85?'var(--amber)':'var(--primary)';const left=budget-exp;let alert;if(ratio>1)alert=`<div class="alert over"><span>⚠</span><span>חרגת מהתקציב ב-${ILS.format(exp-budget)}.</span></div>`;else if(ratio>=.85)alert=`<div class="alert warn"><span>⚡</span><span>נשארו רק ${ILS.format(left)} — היזהר עם הוצאות גדולות.</span></div>`;else alert=`<div class="alert ok"><span>✓</span><span>בתוך התקציב. נשארו ${ILS.format(left)}.</span></div>`;return`<div class="bar"><div class="fill" style="width:${Math.min(ratio*100,100)}%;background:${col}"></div></div><div class="barmeta"><span class="num">${Math.round(ratio*100)}% נוצל</span><span class="num">${left>=0?'נשאר '+ILS.format(left):'חריגה '+ILS.format(-left)}</span></div>${alert}`;}
function savingsSub(goal){if(goal>0){const pct=Math.round(state.savings/goal*100);if(state.savings>=goal)return'הגעת ליעד! 🎉';return`${pct}% מהדרך — עוד ${ILS.format(goal-state.savings)}.`;}return'סך הכל שצברת בחיסכון.';}
function txRow(t){const cat=ALL_CATS.find(c=>c.id===t.cat)||{icon:'•',name:''};const d=new Date(t.date);const ds=d.getDate()+' ב'+MONTHS[d.getMonth()];return`<div class="tx"><div class="tag" onclick="openEdit('${t.id}')">${cat.icon}</div><div class="info" onclick="openEdit('${t.id}')"><div class="d">${t.desc||cat.name} <span class="editpen">✎</span></div><div class="m">${cat.name} · ${ds}</div></div><div class="amt num ${t.type==='income'?'inc':'exp'}" onclick="openEdit('${t.id}')">${t.type==='income'?'+':'−'}${ILS.format(t.amount)}</div><button class="del" onclick="delTx('${t.id}')">✕</button></div>`;}

window.setType = t => { formType=t; render(); };
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

window.submitTx = () => {
  const amt=parseFloat(document.getElementById('f-amt').value);
  if(!amt||amt<=0){toast('צריך להזין סכום חיובי');return;}
  const cat=document.getElementById('f-cat').value;
  const desc=document.getElementById('f-desc').value.trim();
  const dval=document.getElementById('f-date').value;
  const date=dval?new Date(dval+'T12:00:00').toISOString():new Date().toISOString();
  addTx({id:Date.now()+''+Math.random().toString(36).slice(2,6),type:formType,amount:Math.round(amt*100)/100,cat,desc,date});
};

window.submitSettings = () => {
  const budget=parseFloat(document.getElementById('set-budget').value)||0;
  const goal=parseFloat(document.getElementById('set-goal').value)||0;
  const catLimits={};
  document.querySelectorAll('[data-cat]').forEach(el=>{const v=parseFloat(el.value);if(v>0)catLimits[el.dataset.cat]=v;});
  const accRaw=document.getElementById('set-account').value;
  const extra={};
  if(accRaw!==''){const a=parseFloat(accRaw);if(!isNaN(a)){extra.accountSet=true;extra.openingBalance=Math.round(a*100)/100;extra.openingDate=new Date(todayStr()+'T00:00:00').toISOString();}}
  saveSettings({monthlyBudget:budget,savingsGoal:goal,catLimits,...extra});
};

window.customSavings = w => { promptModal({title:w?'משיכה מהחיסכון':'הוספה לחיסכון',label:w?'כמה למשוך? (₪)':'כמה להוסיף? (₪)',value:'',confirmText:w?'משוך':'הוסף',onConfirm:(v)=>{if(v&&v>0)addSavings(w?-v:v);}}); };
window.updateBalance = () => { promptModal({title:'עדכון יתרת חשבון',label:'מה היתרה הנוכחית בחשבון? (₪)',hint:'כל תנועה שתוסיף מכאן תעדכן אותה אוטומטית.',value:state.accountBalance!==null?state.accountBalance:'',confirmText:'שמור יתרה',onConfirm:(v)=>{if(v!==null)setAccountBalance(v);}}); };
window.addSavings = addSavings;
window.delTx = delTx;

let pmCb=null;
window.promptModal = o => {
  pmCb=o.onConfirm;
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closePM()"><div class="modal"><div class="card-title"><span>${o.title}</span><button class="del" onclick="closePM()">✕</button></div><div class="field"><label>${o.label}</label><input id="pm-input" type="number" inputmode="decimal" step="any" value="${o.value}"></div>${o.hint?`<p style="font-size:.8rem;color:var(--faint);margin:-4px 0 14px">${o.hint}</p>`:''}<button class="btn-primary" onclick="confirmPM()">${o.confirmText||'אישור'}</button></div></div>`;
  document.body.style.overflow='hidden';
  const inp=document.getElementById('pm-input');inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')confirmPM();});
};
window.confirmPM = () => { const raw=document.getElementById('pm-input').value;const v=parseFloat(raw);const cb=pmCb;closePM();if(cb)cb(isNaN(v)?null:v); };
window.closePM = () => { document.getElementById('modal-root').innerHTML='';document.body.style.overflow='';pmCb=null; };

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);requestAnimationFrame(()=>el.classList.add('show'));setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),250);},2600);}
window.toast = toast;

let editId=null,editType='expense';
window.openEdit = id => {
  const t=state.tx.find(x=>x.id===id);if(!t)return;
  editId=id;editType=t.type;
  const d=new Date(t.date);const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeEdit()"><div class="modal"><div class="card-title"><span>עריכת תנועה</span><button class="del" onclick="closeEdit()">✕</button></div><div class="seg" id="m-seg"><button class="${t.type==='expense'?'active exp':''}" onclick="setEditType('expense')">הוצאה −</button><button class="${t.type==='income'?'active inc':''}" onclick="setEditType('income')">הכנסה +</button></div><div class="row"><div class="field"><label>סכום (₪)</label><input id="m-amt" type="number" inputmode="decimal" min="0" value="${t.amount}"></div><div class="field"><label>קטגוריה</label><select id="m-cat"></select></div></div><div class="field"><label>תיאור</label><input id="m-desc" type="text" value="${(t.desc||'').replace(/"/g,'&quot;')}"></div><div class="field"><label>תאריך</label><input id="m-date" type="date" value="${ds}"></div><div class="row"><button class="btn-primary" style="flex:2" onclick="saveEdit()">שמור</button><button class="btn-ghost" style="flex:1;color:var(--neg);border-color:#F0C9C2" onclick="delTx('${id}');closeEdit()">מחק</button></div></div></div>`;
  fillEditCats(t.cat);document.body.style.overflow='hidden';
};
window.setEditType = tp => { editType=tp;document.querySelectorAll('#m-seg button').forEach((b,i)=>{b.className=(i===0&&tp==='expense')?'active exp':(i===1&&tp==='income')?'active inc':'';});fillEditCats(); };
function fillEditCats(sel){const cats=editType==='expense'?EXPENSE_CATS:INCOME_CATS;document.getElementById('m-cat').innerHTML=cats.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${c.icon} ${c.name}</option>`).join('');}
window.saveEdit = () => {
  const amt=parseFloat(document.getElementById('m-amt').value);
  if(!amt||amt<=0){toast('צריך להזין סכום חיובי');return;}
  const dval=document.getElementById('m-date').value;
  editTx(editId,{type:editType,amount:Math.round(amt*100)/100,cat:document.getElementById('m-cat').value,desc:document.getElementById('m-desc').value.trim(),date:dval?new Date(dval+'T12:00:00').toISOString():new Date().toISOString()});
  closeEdit();
};
window.closeEdit = () => { document.getElementById('modal-root').innerHTML='';document.body.style.overflow='';editId=null; };

window.showDataText = async () => { showTextModal('גיבוי JSON — העתק ושמור', JSON.stringify({settings:state.settings,savings:state.savings,months:{[monthKey(state.month)]:state.tx}},null,2)); };
window.showCSVText = async () => {
  const rows=[['תאריך','סוג','קטגוריה','תיאור','סכום']];
  const txs=[...state.tx].sort((a,b)=>new Date(a.date)-new Date(b.date));
  for(const t of txs){const c=ALL_CATS.find(x=>x.id===t.cat);rows.push([new Date(t.date).toLocaleDateString('he-IL'),t.type==='income'?'הכנסה':'הוצאה',c?c.name:'',t.desc||'',t.amount]);}
  showTextModal('גיבוי CSV — העתק לאקסל', rows.map(r=>r.join(',')).join('\n'));
};
function showTextModal(title,text){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closePM()"><div class="modal"><div class="card-title"><span>${title}</span><button class="del" onclick="closePM()">✕</button></div><p style="font-size:.85rem;color:var(--muted);margin-bottom:10px">העתק את הטקסט הבא ושמור אותו:</p><textarea readonly onclick="this.select()" style="width:100%;height:220px;font-size:.72rem;font-family:monospace;border:1px solid var(--line);border-radius:10px;padding:10px;background:var(--surface-2);color:var(--ink);resize:none">${text}</textarea><button class="btn-primary" style="margin-top:12px" onclick="navigator.clipboard.writeText(${JSON.stringify(text)}).then(()=>toast('הועתק!')).catch(()=>toast('סמן את הטקסט והעתק ידנית'))">📋 העתק ללוח</button></div></div>`;document.body.style.overflow='hidden';}
window.importBackup = async (inp) => {
  const file=inp.files[0];if(!file)return;
  try{
    const data=JSON.parse(await file.text());
    if(data.settings)await fbSet('settings',data.settings);
    if(typeof data.savings==='number')await fbSet('savings',data.savings);
    if(data.months){for(const k in data.months){await fbSet(k,data.months[k]);}}
    state.settings=await fbGet('settings')||state.settings;
    state.savings=(await fbGet('savings'))??0;
    await loadMonth();await rerender();
    toast('הגיבוי שוחזר בהצלחה');
